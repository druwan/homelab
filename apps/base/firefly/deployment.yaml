apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly
  namespace: firefly
  labels:
    app: firefly
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVC
  selector:
    matchLabels:
      app: firefly
  template:
    metadata:
      labels:
        app: firefly
    spec:
      securityContext:
        fsGroup: 33 # www-data
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z firefly-db-rw.firefly.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 3
              done
      containers:
        - name: firefly
          image: fireflyiii/core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # ── App ───────────────────────────────────────────────────────────
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: firefly-app-secrets
                  key: APP_KEY
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: APP_URL
              value: "https://firefly.christophervestman.com"
            - name: TRUSTED_PROXIES
              value: "**"
            - name: TZ
              value: "Europe/Stockholm"

            # ── Database ──────────────────────────────────────────────────────
            - name: DB_CONNECTION
              value: "pgsql"
            - name: DB_HOST
              value: "firefly-db-rw.firefly.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "firefly"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: firefly-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-db-credentials
                  key: password

            # ── Cron ──────────────────────────────────────────────────────────
            - name: STATIC_CRON_TOKEN
              valueFrom:
                secretKeyRef:
                  name: firefly-app-secrets
                  key: STATIC_CRON_TOKEN

            # # ── Mail ──────────────────────────────────────────────────────────
            # - name: MAIL_MAILER
            #   value: "log" # change to smtp when ready
            # - name: MAIL_FROM
            #   value: "firefly@christophervestman.com"

          volumeMounts:
            - name: upload
              mountPath: /var/www/html/storage/upload
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: firefly-upload
