apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: linkwarden
    role: app
  name: linkwarden
  namespace: linkwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkwarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: linkwarden
        role: app
    spec:
      containers:
        - image: getmeili/meilisearch:v1.49.0
          name: meilisearch
          command:
            - /bin/sh
            - -c
            - |
              DUMP=$(ls -t /meili_data/dumps/*.dump 2>/dev/null | head -1)
              if [ -n "$DUMP" ]; then
                echo "Found dump: $DUMP — importing..."
                rm -rf /meili_data/data.ms
                exec meilisearch --import-dump "$DUMP"
              else
                echo "No dump found — starting fresh"
                exec meilisearch
              fi
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - mountPath: /meili_data
              name: meili-data
        - image: ghcr.io/linkwarden/linkwarden:v2.14.1
          name: linkwarden
          ports:
            - containerPort: 3000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: password

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: POSTGRES_URL

            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: NEXTAUTH_URL

            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: NEXTAUTH_SECRET

          volumeMounts:
            - mountPath: /data/data
              name: linkwarden-data
      volumes:
        - name: linkwarden-data
          persistentVolumeClaim:
            claimName: linkwarden-data-pvc
        - name: meili-data
          persistentVolumeClaim:
            claimName: meili-data-pvc
