apiVersion: batch/v1
kind: Job
metadata:
  name: meilisearch-dump
  namespace: linkwarden
  annotations:
    "helm.sh/hook": pre-upgrade # runs BEFORE the Deployment is updated
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: dump-creator
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Triggering dump..."
              RESPONSE=$(curl -sf -X POST http://meilisearch:7700/dumps \
                -H "Authorization: Bearer $MEILI_MASTER_KEY")
              TASK_UID=$(echo "$RESPONSE" | grep -o '"taskUid":[0-9]*' | grep -o '[0-9]*')

              echo "Waiting for task $TASK_UID to complete..."
              while true; do
                STATUS=$(curl -sf "http://meilisearch:7700/tasks/$TASK_UID" \
                  -H "Authorization: Bearer $MEILI_MASTER_KEY" \
                  | grep -o '"status":"[^"]*"' | grep -o '[^"]*"$' | tr -d '"')
                echo "Status: $STATUS"
                case "$STATUS" in
                  succeeded) echo "Dump created successfully!"; exit 0 ;;
                  failed)    echo "Dump failed!"; exit 1 ;;
                esac
                sleep 3
              done
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-credentials
                  key: MEILI_MASTER_KEY
