apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: flaresolverr
  name: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
          ports:
            - containerPort: 8191
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: TZ
              value: Europe/Stockholm
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 15
