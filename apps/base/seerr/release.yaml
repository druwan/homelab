apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 30m
  chart:
    spec:
      chart: seerr-chart
      version: "3.6.0"
      sourceRef:
        kind: HelmRepository
        name: seerr
  values:
    image:
      pullPolicy: IfNotPresent
    fullnameOverride: seerr
    extraEnv:
      - name: TZ
        value: "Europe/Stockholm"
    config:
      persistence:
        enabled: true
        size: 5Gi
        accessModes:
          - ReadWriteOnce
        storageClass: truenas-pvc-nfs
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      privileged: false
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - host: seerr.christophervestman.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: seerr-tls
          hosts:
            - seerr.christophervestman.com
