apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: qbittorrent
  name: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 3100
        supplementalGroups: [3100]
      containers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            - name: TZ
              value: Europe/Stockholm
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: VPN_PORT_FORWARDING_DOWN_COMMAND
              value: >-
                /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data
                "json={\"listen_port\":{{PORTS}},\"random_port\":false,\"upnp\":false}"
                http://127.0.0.1:8080/api/v2/app/setPreferences'
            - name: VPN_PORT_FORWARDING_UP_COMMAND
              value: >-
                /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data
                "json={\"listen_port\":0}"
                http://127.0.0.1:8080/api/v2/app/setPreferences'
          envFrom:
            - secretRef:
                name: openvpn-secrets
          ports:
            - name: webui
              containerPort: 8080
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP

        - name: qbittorrent
          image: ghcr.io/linuxserver/qbittorrent:5.1.4-r3-ls453
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "3100"
          volumeMounts:
            - mountPath: /config
              name: qbittorrent-config
            - mountPath: /media
              name: media

        - name: qui
          image: ghcr.io/autobrr/qui:v1.23.0
          env:
            - name: QUI__METRICS_ENABLED
              value: "true"
            - name: QUI__METRICS_HOST
              value: "0.0.0.0"
            - name: QUI__METRICS_PORT
              value: "9074"
          ports:
            - name: quiui
              containerPort: 7476
            - name: metrics
              containerPort: 9074
          volumeMounts:
            - mountPath: /config
              name: qbittorrent-config
            - mountPath: /media
              name: media
      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
