apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dispatcharr
  name: dispatcharr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr
  template:
    metadata:
      labels:
        app: dispatcharr
    spec:
      securityContext:
        fsGroup: 3100
        fsGroupChangePolicy: OnRootMismatch
        runAsUser: 33
        runAsGroup: 33
        supplementalGroups: [3100, 989]
      containers:
        - image: ghcr.io/dispatcharr/dispatcharr:0.26.0
          name: dispatcharr
          ports:
            - containerPort: 9191
          securityContext:
            privileged: true
          env:
            - name: DISPATCHARR_ENV
              value: aio
            - name: REDIS_HOST
              value: localhost
            - name: CELERY_BROKER_URL
              value: redis://localhost:6379/0
            - name: DISPATCHARR_LOG_LEVEL
              value: info
          volumeMounts:
            - mountPath: /data
              name: dispatcharr-data
      volumes:
        - name: dispatcharr-data
          persistentVolumeClaim:
            claimName: dispatcharr-data-pvc
