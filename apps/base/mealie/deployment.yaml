apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mealie
    role: app
  name: mealie
  namespace: mealie
spec:
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
        role: app
    spec:
      securityContext:
        fsGroup: 911
        runAsUser: 911
        runAsGroup: 911
      containers:
        - image: ghcr.io/mealie-recipes/mealie:v3.13.1
          name: mealie
          env:
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_DB
              value: "mealie"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-db-credentials
                  key: password
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealie-db-credentials
                  key: username
            - name: POSTGRES_SERVER
              value: "mealie-db-rw.mealie.svc.cluster.local"
            - name: TZ
              value: Europe/Stockholm
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9000
          volumeMounts:
            - mountPath: /app/data
              name: mealie-data
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data-pvc
