apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2026.5.5"
      sourceRef:
        kind: HelmRepository
        name: authentik
  values:
    global:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
    authentik:
      existingSecret:
        secretName: authentik-db-credentials
    postgresql:
      enabled: false
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - authentik.christophervestman.com
        tls:
          - secretName: authentik-tls
            hosts:
              - authentik.christophervestman.com
