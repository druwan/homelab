apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-api
  namespace: life
  labels:
    app: health-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-api
  template:
    metadata:
      labels:
        app: health-api
    spec:
      containers:
        - name: health-api
          image: ghcr.io/druwan/health-api:0.2.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "lifedata"
            - name: DB_HOST
              value: "lifedata-db-v0-rw.life.svc.cluster.local"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lifedata-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lifedata-db-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
