apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.6.2
          ports:
            - containerPort: 6379
          volumeMounts:
            - mountPath: /data
              name: paperless-redis-broker-data
      restartPolicy: Always
      volumes:
        - name: paperless-redis-broker-data
          persistentVolumeClaim:
            claimName: paperless-redis-broker-data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: paperless-ngx
    role: app
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-ngx
  template:
    metadata:
      labels:
        app: paperless-ngx
        role: app
    spec:
      containers:
        - image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
          name: paperless-ngx
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: PAPERLESS_OCR_LANGUAGES
              value: eng swe sin

            - name: PAPERLESS_OCR_LANGUAGE
              value: "eng+swe+sin"

            - name: PAPERLESS_TIME_ZONE
              value: "Europe/Stockholm"

            - name: PAPERLESS_DBENGINE
              value: postgresql

            - name: PAPERLESS_URL
              value: "https://paperless-ngx.christophervestman.com"

            - name: PAPERLESS_REDIS
              value: "redis://redis:6379"

            - name: PAPERLESS_DBHOST
              value: paperless-ngx-db-v1-rw.paperless-ngx.svc.cluster.local

            - name: PAPERLESS_DBNAME
              value: paperless

            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: username

            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: password

            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminUser

            - name: PAPERLESS_ADMIN_MAIL
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminMail

            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminPassword

          volumeMounts:
            - mountPath: /usr/src/paperless/data
              name: paperless-ngx-data
            - mountPath: /usr/src/paperless/media
              name: paperless-ngx-media
            - mountPath: /usr/src/paperless/export
              name: paperless-ngx-export
            - mountPath: /usr/src/paperless/consume
              name: paperless-ngx-consume
      restartPolicy: Always
      volumes:
        - name: paperless-ngx-data
          persistentVolumeClaim:
            claimName: paperless-ngx-data-pvc
        - name: paperless-ngx-media
          persistentVolumeClaim:
            claimName: paperless-ngx-media-pvc
        - name: paperless-ngx-export
          persistentVolumeClaim:
            claimName: paperless-ngx-export-pvc
        - name: paperless-ngx-consume
          persistentVolumeClaim:
            claimName: paperless-ngx-consume-pvc
