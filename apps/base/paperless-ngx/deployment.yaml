apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.8.0
          ports:
            - containerPort: 6379
          volumeMounts:
            - mountPath: /data
              name: paperless-redis-broker-data
      restartPolicy: Always
      volumes:
        - name: paperless-redis-broker-data
          persistentVolumeClaim:
            claimName: paperless-redis-broker-data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotenberg
  template:
    metadata:
      labels:
        app: gotenberg
    spec:
      securityContext:
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        privileged: false
        runAsUser: 1001
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8.34.0
          env:
            - name: CHROMIUM_DISABLE_ROUTES
              value: "true"
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      containers:
        - name: tika
          image: apache/tika:3.3.1.0-full
          ports:
            - containerPort: 9998
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: paperless-ngx
    role: app
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-ngx
  template:
    metadata:
      labels:
        app: paperless-ngx
        role: app
    spec:
      containers:
        - image: ghcr.io/paperless-ngx/paperless-ngx:3.0.2
          name: paperless-ngx
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: PAPERLESS_OCR_LANGUAGES
              value: eng swe sin
            - name: PAPERLESS_OCR_LANGUAGE
              value: "eng+swe+sin"
            - name: PAPERLESS_CONSUMER_DELETE_DUPLICATES
              value: "true"
            - name: PAPERLESS_FILENAME_FORMAT
              value: "{{ created_year }}/{{ correspondent }}/{{ created }}_{{ title }}"
            - name: PAPERLESS_TIME_ZONE
              value: "Europe/Stockholm"
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_URL
              value: "https://paperless-ngx.christophervestman.com"
            - name: PAPERLESS_REDIS
              value: "redis://redis:6379"
            - name: PAPERLESS_DBHOST
              value: paperless-ngx-db-v1-rw.paperless-ngx.svc.cluster.local
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: appSecretKey
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: username
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: password
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminUser
            - name: PAPERLESS_ADMIN_MAIL
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminMail
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-db-credentials
                  key: adminPassword
            - name: PAPERLESS_TIKA_ENABLED
              value: "true"
            - name: PAPERLESS_TIKA_ENDPOINT
              value: "http://tika:9998"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: "http://gotenberg:3000"
          volumeMounts:
            - mountPath: /usr/src/paperless/data
              name: paperless-ngx-data
            - mountPath: /usr/src/paperless/media
              name: paperless-ngx-media
            - mountPath: /usr/src/paperless/export
              name: paperless-ngx-export
            - mountPath: /usr/src/paperless/consume
              name: paperless-ngx-consume
      restartPolicy: Always
      volumes:
        - name: paperless-ngx-data
          persistentVolumeClaim:
            claimName: paperless-ngx-data-pvc
        - name: paperless-ngx-media
          persistentVolumeClaim:
            claimName: paperless-ngx-media-pvc
        - name: paperless-ngx-export
          persistentVolumeClaim:
            claimName: paperless-ngx-export-pvc
        - name: paperless-ngx-consume
          persistentVolumeClaim:
            claimName: paperless-ngx-consume-pvc
