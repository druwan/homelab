apiVersion: batch/v1
kind: CronJob
metadata:
  name: firefly-cron
  namespace: firefly
spec:
  schedule: "0 3 * * *"
  timeZone: "Europe/Stockholm"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: firefly-cron
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cron
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - |
                  curl -sf "http://firefly.firefly.svc.cluster.local/api/v1/cron/${STATIC_CRON_TOKEN}"
              env:
                - name: STATIC_CRON_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: firefly-app-secrets
                      key: STATIC_CRON_TOKEN
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
---
