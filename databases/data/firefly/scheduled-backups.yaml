# Daily backup at 01:00
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: firefly-db-daily-hexabyte
  namespace: firefly
spec:
  immediate: true
  schedule: "0 0 1 * * *"
  cluster:
    name: firefly-db-v1
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: firefly-backup-hexabyte
  backupOwnerReference: cluster
---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: firefly-db-ondemand
  namespace: firefly
spec:
  cluster:
    name: firefly-db-v1
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: firefly-backup-hexabyte
