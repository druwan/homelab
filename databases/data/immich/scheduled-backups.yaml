apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: immich-db-daily-hexabyte
  namespace: immich
spec:
  immediate: true
  schedule: "0 30 3 * * *"
  cluster:
    name: immich-db-v1
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: immich-db-backup-hexabyte
  backupOwnerReference: cluster
