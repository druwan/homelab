apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mealie-db-v1
  namespace: mealie
spec:
  description: Postgres Cluster for Mealie
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  imagePullPolicy: Always
  inheritedMetadata:
    labels:
      app: mealie-db
      policy-type: database
  instances: 3
  storage:
    size: 10Gi
    storageClass: truenas-nvme-nfs
    resizeInUseVolumes: true

  walStorage:
    size: 2Gi
    storageClass: truenas-nvme-nfs

  superuserSecret:
    name: mealie-db-superuser

  # FRESH INSTALL: contains no backup. Have to use initdb
  # bootstrap:
  #   initdb:
  #     database: mealie
  #     owner: mealie
  #     secret:
  #       name: mealie-db-credentials

  # DISTASTER RECOVERY: Once a backup exists, replace the initdb with the block below
  bootstrap:
    recovery:
      source: mealie-db-hexabyte
      database: mealie
      owner: mealie
      secret:
        name: mealie-db-credentials

  externalClusters:
    - name: mealie-db-hexabyte
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: mealie-db-backup-hexabyte
          serverName: mealie-db

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: mealie-db-backup-hexabyte

  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
    roles:
      - name: mealie
        ensure: present
        login: true
        createdb: false
        passwordSecret:
          name: mealie-db-credentials
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mealie-db
  namespace: mealie
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: mealie-db-v1
  podMetricsEndpoints:
    - port: metrics
