apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-db-superuser
  namespace: mealie
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: mealie-db-superuser
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hexabyte-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: hexabyte-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: hexabyte-access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: hexabyte-secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-db-credentials
  namespace: mealie
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: mealie-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "mealie"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: mealie-db-password
