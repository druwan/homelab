# Daily backup at 01:15
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-db-daily-backup
  namespace: n8n
spec:
  immediate: true
  schedule: "0 15 0 * * *"
  cluster:
    name: n8n-db-v1
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: n8n-db-backup-hexabyte
  backupOwnerReference: cluster
