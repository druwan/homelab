apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-db-superuser
  namespace: paperless-ngx
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: paperless-ngx-db-superuser
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hexabyte-credentials
  namespace: paperless-ngx
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: hexabyte-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: hexabyte-access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: hexabyte-secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-db-credentials
  namespace: paperless-ngx
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: paperless-ngx-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "paperless"
        password: "{{ .password }}"
        adminMail: "{{ .adminMail }}"
        adminPassword: "{{ .adminPassword }}"
        adminUser: "{{ .adminUser }}"
  data:
    - secretKey: password
      remoteRef:
        key: paperless-ngx-db-password
    - secretKey: adminMail
      remoteRef:
        key: paperless-ngx-db-admin-mail
    - secretKey: adminPassword
      remoteRef:
        key: paperless-ngx-db-admin-password
    - secretKey: adminUser
      remoteRef:
        key: paperless-ngx-db-admin-user
