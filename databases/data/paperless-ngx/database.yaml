apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-ngx-db
  namespace: paperless-ngx
spec:
  description: "Postgres cluster for Paperless-ngx"
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  inheritedMetadata:
    labels:
      app: paperless-ngx-db
      policy-type: database
  instances: 3
  storage:
    size: 10Gi
    storageClass: truenas-nvme-nfs
    resizeInUseVolumes: true

  walStorage:
    size: 2Gi
    storageClass: truenas-nvme-nfs

  superuserSecret:
    name: paperless-ngx-db-superuser

  # FRESH INSTALL: contains no backup. Have to use initdb
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-ngx-db-credentials

  # DISTASTER RECOVERY: Once a backup exists, replace the initdb with the block below
  # bootstrap:
  #   recovery:
  #     source: paperless-ngx-db-hexabyte
  #     database: paperless
  #     owner: paperless
  #     secret:
  #       name: paperless-ngx-db-credentials
  # externalClusters:
  #   - name: paperless-ngx-db-hexabyte
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: paperless-ngx-db-backup-hexabyte

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: paperless-ngx-db-backup-hexabyte

  managed:
    services:
      disabledDefaultServices: ["r", "ro"]
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: paperless-ngx-db
  namespace: paperless-ngx
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: paperless-ngx-db
  podMetricsEndpoints:
    - port: metrics
