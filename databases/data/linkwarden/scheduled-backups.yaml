# Daily backup at 02:00
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: linkwarden-db-daily-hexabyte
  namespace: linkwarden
spec:
  immediate: true
  schedule: "0 0 2 * * *"
  cluster:
    name: linkwarden-db-v1
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: linkwarden-db-backup-hexabyte
  backupOwnerReference: cluster
