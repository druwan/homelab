apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-db-credentials
  namespace: life
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: outline-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "outline"
        password: "{{ .password }}"
        outline-secret-key: "{{ .secretKey }}"
        outline-utils-secret: "{{ .utilsSecret }}"
        database-uri: "postgresql://outline:{{ .password }}@outline-db-v0-rw.life.svc.cluster.local:5432/outline"

  data:
    - secretKey: password
      remoteRef:
        key: outline-db-password
    - secretKey: secretKey
      remoteRef:
        key: outline-secret-key
    - secretKey: utilsSecret
      remoteRef:
        key: outline-utils-secret
