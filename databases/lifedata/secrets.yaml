apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lifedata-db-superuser
  namespace: life
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: lifedata-db-superuser
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hexabyte-credentials
  namespace: life
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: hexabyte-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: hexabyte-access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: hexabyte-secret-access-key
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: restic-backup-password
---
