apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sure-db-v0
  namespace: sure
spec:
  description: "Postgres cluster for Sure"
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  imagePullPolicy: Always
  inheritedMetadata:
    labels:
      app: sure-db
      policy-type: database
  instances: 3
  storage:
    size: 10Gi
    storageClass: truenas-nvme-nfs
    resizeInUseVolumes: true

  walStorage:
    size: 2Gi
    storageClass: truenas-nvme-nfs

  superuserSecret:
    name: sure-db-superuser

  # FRESH INSTALL: contains no backup. Have to use initdb
  bootstrap:
    initdb:
      database: sure
      owner: sure
      secret:
        name: sure-db-credentials

  # DISASTER RECOVERY: Once a backup exists, replace the initdb with the block below
  # bootstrap:
  #   recovery:
  #     source: sure-db-hexabyte
  #     database: sure
  #     owner: sure
  #     secret:
  #       name: sure-db-credentials
  # externalClusters:
  #   - name: sure-db-hexabyte
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: sure-db-backup-hexabyte
  #         serverName: sure-db

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: sure-db-backup-hexabyte

  managed:
    services:
      disabledDefaultServices: ["r", "ro"]
    roles:
      - name: sure
        ensure: present
        login: true
        createdb: false
        passwordSecret:
          name: sure-db-credentials
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sure-db
  namespace: sure
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: sure-db-v0
  podMetricsEndpoints:
    - port: metrics
