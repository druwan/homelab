apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linkwarden-db-superuser
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: linkwarden-db-superuser
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hexabyte-credentials
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: hexabyte-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: hexabyte-access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: hexabyte-secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linkwarden-db-credentials
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: linkwarden-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "linkwarden"
        password: "{{ .password }}"
        NEXTAUTH_URL: "{{ .NEXTAUTH_URL }}"
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        MEILI_MASTER_KEY: "{{ .MEILI_MASTER_KEY }}"
        POSTGRES_URL: "postgresql://linkwarden:{{ .password }}@linkwarden-db-v1-rw.linkwarden.svc.cluster.local:5432/linkwarden"

  data:
    - secretKey: NEXTAUTH_URL
      remoteRef:
        key: linkwarden-nextauth-url

    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: linkwarden-nextauth-secret

    - secretKey: MEILI_MASTER_KEY
      remoteRef:
        key: linkwarden-meili-master-key

    - secretKey: password
      remoteRef:
        key: linkwarden-db-password
