apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-v1
  namespace: immich
spec:
  description: "Postgres cluster for Immich"
  imageName: ghcr.io/cloudnative-pg/postgis:17-3-standard-trixie
  imagePullPolicy: Always
  inheritedMetadata:
    labels:
      app: immich-db
      policy-type: database
  instances: 3
  storage:
    size: 100Gi
    storageClass: truenas-nvme-nfs
    resizeInUseVolumes: true

  walStorage:
    size: 10Gi
    storageClass: truenas-nvme-nfs

  superuserSecret:
    name: immich-db-superuser

  # FRESH INSTALL: contains no backup. Have to use initdb
  # bootstrap:
  #   initdb:
  #     database: immich
  #     owner: immich
  #     secret:
  #       name: immich-db-credentials
  #     postInitApplicationSQL:
  #       - CREATE EXTENSION IF NOT EXISTS vector CASCADE;
  #       - CREATE EXTENSION IF NOT EXISTS cube CASCADE;
  #       - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
  #       - CREATE EXTENSION IF NOT EXISTS pg_trgm CASCADE;

  # DISASTER RECOVERY: Once a backup exists, replace the initdb with the block below
  bootstrap:
    recovery:
      source: immich-db-hexabyte
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
  externalClusters:
    - name: immich-db-hexabyte
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-db-backup-hexabyte
          serverName: immich-db

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-backup-hexabyte

  managed:
    services:
      disabledDefaultServices: ["r", "ro"]
    roles:
      - name: immich
        ensure: present
        login: true
        createdb: false
        passwordSecret:
          name: immich-db-credentials
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: immich-db
  namespace: immich
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: immich-db-v1
  podMetricsEndpoints:
    - port: metrics
