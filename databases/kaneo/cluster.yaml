apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kaneo-db-v0
  namespace: kaneo
spec:
  description: "Postgres cluster for Kaneo application"
  imageName: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie
  imagePullPolicy: Always
  inheritedMetadata:
    labels:
      app: kaneo-db
      policy-type: database
  instances: 1

  storage:
    size: 5Gi
    storageClass: truenas-nvme-nfs
    resizeInUseVolumes: true

  walStorage:
    size: 5Gi
    storageClass: truenas-nvme-nfs

  superuserSecret:
    name: kaneo-db-superuser

  # FRESH INSTALL: contains no backup. Have to use initdb
  bootstrap:
    initdb:
      database: kaneo
      owner: kaneo
      secret:
        name: kaneo-db-credentials

  # DISASTER RECOVERY: Once a backup exists, replace the initdb with the block below
  # bootstrap:
  #   recovery:
  #     source: kaneo-db-hexabyte
  #     database: kaneo
  #     owner: kaneo
  #     secret:
  #       name: kaneo-db-credentials
  # externalClusters:
  #   - name: kaneo-db-hexabyte
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: kaneo-db-backup-hexabyte
  #         serverName: kaneo-db

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: kaneo-db-backup-hexabyte

  managed:
    services:
      disabledDefaultServices: ["r", "ro"]

    roles:
      - name: kaneo
        ensure: present
        login: true
        createdb: false
        passwordSecret:
          name: kaneo-db-credentials
