apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-db-superuser
  namespace: kaneo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: kaneo-db-superuser
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hexabyte-credentials
  namespace: kaneo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: hexabyte-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: hexabyte-access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: hexabyte-secret-access-key
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: restic-backup-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-db-credentials
  namespace: kaneo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: kaneo-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "kaneo"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: kaneo-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-db-credentials
  namespace: kaneo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-store
  target:
    name: kaneo-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "kaneo"
        password: "{{ .dbPassword }}"
        auth-secret: "{{ .authSecret }}"
        postgres_uri: "postgresql://kaneo:{{ .dbPassword }}@kaneo-db-v0-rw.kaneo.svc:5432/kaneo"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: kaneo-db-password
    - secretKey: authSecret
      remoteRef:
        key: kaneo-auth-secret
