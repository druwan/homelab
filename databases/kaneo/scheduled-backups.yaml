apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: kaneo-db-daily-hexabyte
  namespace: kaneo
spec:
  immediate: true
  schedule: "0 30 3 * * *"
  cluster:
    name: kaneo-db-v0
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: kaneo-db-backup-hexabyte
  backupOwnerReference: cluster
---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: kaneo-db-ondemand
  namespace: kaneo
spec:
  cluster:
    name: kaneo-db-v0
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: kaneo-db-backup-hexabyte
