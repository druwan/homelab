apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: "13.*"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: monitoring
      interval: 1h
  values:
    deploymentMode: Monolithic
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      ui:
        enabled: true
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: truenas-nvme-nfs
        accessModes:
          - ReadWriteOnce
        size: 50Gi


    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - loki.christophervestman.com
      tls:
        - secretName: loki-tls
          hosts:
            - loki.christophervestman.com

    test:
      enabled: false
      replicas: 0
    lokiCanary:
      enabled: false
      replicas: 0
    gateway:
      enabled: false
      replicas: 0
    write:
      enabled: false
      replicas: 0
    read:
      enabled: false
      replicas: 0
    backend:
      enabled: false
      replicas: 0
    ingester:
      enabled: false
      replicas: 0
    distributor:
      enabled: false
      replicas: 0
    querier:
      enabled: false
      replicas: 0
    queryFrontend:
      enabled: false
      replicas: 0
    queryScheduler:
      enabled: false
      replicas: 0
    indexGateway:
      enabled: false
      replicas: 0
    compactor:
      enabled: false
      replicas: 0
    bloomGateway:
      enabled: false
      replicas: 0
    bloomPlanner:
      enabled: false
      replicas: 0
    bloomBuilder:
      enabled: false
      replicas: 0
    patternIngester:
      enabled: false
      replicas: 0

