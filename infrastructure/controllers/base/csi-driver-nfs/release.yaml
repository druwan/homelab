apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: csi-driver-nfs
      version: "4.13.3"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: kube-system
      interval: 24h
  values:
    externalSnapshotter:
      enabled: true
      volumeSnapshotClass:
        create: true
        name: csi-nfs-snapclass
        deletionPolicy: Delete

    controller:
      replicas: 2
      runOnControlPlane: true

    storageClasses:
      - name: truenas-pvc-nfs
        parameters:
          server: 192.168.1.83
          share: /mnt/main/k8s/pvc
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        mountOptions:
          - nfsvers=4.2

      - name: truenas-media-nfs
        parameters:
          server: 192.168.1.83
          share: /mnt/main/k8s/media
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        mountOptions:
          - nfsvers=4.2

      - name: truenas-nvme-nfs
        parameters:
          server: 192.168.1.83
          share: /mnt/nvme/k8s-fast
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        mountOptions:
          - nfsvers=4.2

