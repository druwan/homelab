apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 12h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: barman-cloud-plugin
  namespace: cnpg-system
spec:
  interval: 30m
  dependsOn:
    - name: cnpg
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 12h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-grafana-dashboard
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: cluster
      version: "0.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-grafana-dashboard
        namespace: monitoring
      interval: 12h
  values:
    grafanaDashboard:
      namespace: monitoring
      sidecarLabel: ""
      sidecarLabelValue: ""
      labels:
        grafana_dashboard: "1"
