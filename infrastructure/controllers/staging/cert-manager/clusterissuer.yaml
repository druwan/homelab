apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: christophervestman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - selector:
          dnsZones:
            - christophervestman.com
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-tokens
              key: cert-manager-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: christophervestman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - selector:
          dnsZones:
            - christophervestman.com
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-tokens
              key: cert-manager-token
